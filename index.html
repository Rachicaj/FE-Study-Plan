<script>
const S=[
  // ── FOUNDATIONS ──
  {id:1,date:"Thu Mar 19",phase:"Foundations",type:"learn",color:"#FF6B9D",
   topic:"Calculus Basics",qRange:"Part of 6–9 math questions",
   subs:["Watch 1–2 videos on derivatives and integrals","Focus: what is a derivative? what is an integral? how do you use them?","Practice 5 simple derivative problems (power rule, chain rule)","Practice 5 simple integral problems (basic antiderivatives)"],
   tip:"You don't need to be a calculus expert — the handbook has all the formulas. You just need to recognize WHAT type of problem it is and WHICH formula to grab. Start slow and build confidence.",
   free:["3Blue1Brown — 'Essence of Calculus' Ch.1 on YouTube (just watch, very visual)","Professor Leonard — Calc 1 Lecture 1 on YouTube (free)"],
   book:"Kreyszig — Advanced Engineering Mathematics (Ch. 1–2)"},

  {id:2,date:"Fri Mar 20",phase:"Foundations",type:"learn",color:"#FF6B9D",
   topic:"Differential Equations & Linear Algebra",qRange:"Part of 6–9 math questions",
   subs:["Learn what a differential equation is and how to identify one","Focus on first-order ODEs (separable equations)","Learn basic matrix operations: multiply, transpose, determinant","Look at Laplace transforms in the handbook — just know they exist and where to find them"],
   tip:"ODEs look scary but FE questions usually give you a standard form you just plug into. Same with matrices — know the basic operations. Laplace transforms: find the table in the handbook and practice looking things up in it.",
   free:["Professor Leonard — Differential Equations playlist (start with Lecture 1)","Khan Academy — Matrices (free)"],
   book:"Kreyszig — Advanced Engineering Mathematics"},

  {id:3,date:"Thu Mar 26",phase:"Foundations",type:"learn",color:"#FF6B9D",
   topic:"Probability & Statistics",qRange:"4–6 exam questions",
   subs:["Learn mean, median, mode, standard deviation — what they mean and how to calculate","Learn normal distribution: what it looks like, what z-score means","Practice reading a z-table (it's in the handbook)","Learn basic probability: P(A and B), P(A or B), conditional probability"],
   tip:"Stats questions are some of the most straightforward on the exam. Know your basic formulas (they're in the handbook) and know how to read the normal distribution table. You can get all 4–6 of these questions right with a few hours of focused study.",
   free:["Khan Academy — Statistics & Probability (free, start from the beginning)","The Organic Chemistry Tutor — Statistics on YouTube"],
   book:"Montgomery & Runger — Applied Statistics for Engineers"},

  {id:4,date:"Fri Mar 27",phase:"Foundations",type:"learn",color:"#FF6B9D",
   topic:"Ethics & Engineering Economics",qRange:"4–6 questions each",
   subs:["Read the NSPE Code of Ethics once (free PDF at nspe.org) — takes 20 min","Do 5 ethics practice questions to see how they're framed","Learn time value of money: what is present worth? future worth? annuity?","Learn the interest factor tables in the handbook (P/F, F/P, A/P, P/A)"],
   tip:"Ethics = almost free points. The questions are scenario-based — ask yourself 'what would a responsible engineer do?' For economics, you never memorize the factor tables — they're in the handbook. Your only job is to pick the right one.",
   free:["NSPE Code of Ethics — nspe.org (free PDF)","Chad Bhatt — Engineering Economics YouTube (free, very clear)"],
   book:"Blank & Tarquin — Engineering Economy"},

  // ── STATICS ──
  {id:5,date:"Thu Apr 2",phase:"Statics",type:"learn",color:"#FF4D7A",
   topic:"Forces & Free Body Diagrams",qRange:"Part of 9–14 statics questions",
   subs:["Learn what a force vector is: magnitude, direction, components","Practice breaking forces into x and y components using sin and cos","Learn what a Free Body Diagram (FBD) is and how to draw one","Draw FBDs for 3 simple examples: a block on a surface, a hanging weight, a leaning ladder"],
   tip:"The Free Body Diagram is THE most important skill in all of Statics, Dynamics, and Mechanics of Materials. Every single problem starts with one. Get very comfortable drawing them now — it pays dividends for months.",
   free:["Jeff Hanson — Statics Lecture 1 on YouTube (free, starts from scratch — the best)","Engineer4Free — Statics: Force Vectors"],
   book:"Hibbeler — Engineering Mechanics: Statics (Ch. 1–3)"},

  {id:6,date:"Fri Apr 3",phase:"Statics",type:"learn",color:"#FF4D7A",
   topic:"Equilibrium of Rigid Bodies",qRange:"Part of 9–14 statics questions",
   subs:["Learn the equilibrium conditions: ΣFx = 0, ΣFy = 0, ΣM = 0","Practice finding reactions at supports (pins, rollers, fixed supports)","Solve 3 equilibrium problems: a beam with loads, a ladder against a wall","Learn the difference between 2D and 3D equilibrium"],
   tip:"Equilibrium problems are very formulaic: (1) draw FBD, (2) write the 3 equations, (3) solve. The hardest part is drawing the FBD correctly. Once that's right, the math is just algebra.",
   free:["Jeff Hanson — Equilibrium YouTube (same Statics playlist, Lecture 2–4)","structurefree — Beam Reactions on YouTube"],
   book:"Hibbeler — Engineering Mechanics: Statics (Ch. 4–5)"},

  {id:7,date:"Thu Apr 9",phase:"Statics",type:"learn",color:"#FF4D7A",
   topic:"Trusses",qRange:"Part of 9–14 statics questions",
   subs:["Learn what a truss is and the assumptions we make (two-force members, pins at joints)","Learn Method of Joints: analyze each joint starting from one with only 2 unknowns","Learn Method of Sections: cut through 3 members to find one member's force fast","Practice: solve one truss using Method of Joints, one using Method of Sections"],
   tip:"Trusses are almost guaranteed on the FE exam. Method of Joints is systematic but slow. Method of Sections is faster when you just need one specific member. Check for zero-force members first — they save a lot of time.",
   free:["Jeff Hanson — Trusses YouTube (Statics playlist, search 'Jeff Hanson trusses')","structurefree — Method of Sections on YouTube"],
   book:"Hibbeler — Engineering Mechanics: Statics (Ch. 6)"},

  {id:8,date:"Fri Apr 10",phase:"Statics",type:"learn",color:"#FF4D7A",
   topic:"Centroids & Moments of Inertia",qRange:"Part of 9–14 statics questions",
   subs:["Learn what a centroid is: the geometric center of a shape","Practice finding centroids of composite shapes (split into rectangles/triangles, combine)","Learn moment of inertia (I): what it measures, formula for a rectangle and circle","Learn the Parallel Axis Theorem: I = I_c + A·d² — used for composite shapes"],
   tip:"Composite shapes: always break them into simple shapes you know (rectangles, circles, triangles). Find the centroid of each part, then take a weighted average. The Parallel Axis Theorem formula is in the handbook — you just need to know how to apply it.",
   free:["Jeff Hanson — Centroids YouTube (Statics playlist)","The Organic Chemistry Tutor — Centroid of Composite Shapes YouTube"],
   book:"Hibbeler — Engineering Mechanics: Statics (Ch. 9–10)"},

  // ── PRACTICE 1 ──
  {id:9,date:"Thu Apr 16",phase:"Statics",type:"practice",color:"#FF4D7A",
   topic:"⚡ Practice — Foundations & Statics",qRange:"20 problems — timed",
   subs:["Do 5 math/stats problems","Do 5 ethics/econ problems","Do 10 statics problems: equilibrium, trusses, centroids","Time yourself: ~3 minutes per problem","For every wrong answer: find the formula in the FE handbook and redo it"],
   tip:"This is your first practice session — it's okay if you get a lot wrong! The whole point is to see where your gaps are. Wrong answers now are valuable data. Write down every topic where you struggled.",
   free:["PrepFE app — free practice questions by topic","Lindeburg — FE Mechanical Practice Problems"],
   book:"NCEES FE Reference Handbook — practice finding things in it"},

  // ── DYNAMICS ──
  {id:10,date:"Fri Apr 17",phase:"Dynamics",type:"learn",color:"#FF7AAD",
   topic:"Kinematics — How Things Move",qRange:"Part of 10–15 dynamics questions",
   subs:["Learn the difference between kinematics (motion) and kinetics (forces causing motion)","Learn the 4 key equations for constant acceleration: v = v₀ + at, x = x₀ + v₀t + ½at², v² = v₀² + 2ax, etc.","Practice: a car accelerates from rest — find velocity after 5 seconds","Learn 2D motion: projectile motion, breaking into x and y directions"],
   tip:"Kinematics is just describing motion mathematically — no forces yet. The 4 constant-acceleration equations are in the handbook. For 2D motion, always separate into x-direction and y-direction and solve each independently.",
   free:["Jeff Hanson — Dynamics Lecture 1 YouTube (free, starts from basics)","The Organic Chemistry Tutor — Kinematics problems"],
   book:"Hibbeler — Engineering Mechanics: Dynamics (Ch. 12)"},

  {id:11,date:"Thu Apr 23",phase:"Dynamics",type:"learn",color:"#FF7AAD",
   topic:"Newton's Laws & Forces in Motion",qRange:"Part of 10–15 dynamics questions",
   subs:["Review Newton's 3 laws — especially F = ma in detail","Learn how to draw a FBD AND a kinetic diagram (showing ma) side by side","Practice: find acceleration of a block being pulled on a surface with friction","Learn Newton's law for circular motion: centripetal acceleration = v²/r"],
   tip:"The process is ALWAYS: (1) draw FBD, (2) draw kinetic diagram with ma arrow, (3) write ΣF = ma in x and y directions, (4) solve. If you follow this process every time you won't miss these questions.",
   free:["Jeff Hanson — Newton's Law Dynamics YouTube","Michel van Biezen — F=ma problems on YouTube"],
   book:"Hibbeler — Engineering Mechanics: Dynamics (Ch. 13)"},

  {id:12,date:"Fri Apr 24",phase:"Dynamics",type:"learn",color:"#FF7AAD",
   topic:"Work, Energy & Power",qRange:"Part of 10–15 dynamics questions",
   subs:["Learn the work-energy theorem: Work = ΔKE = ½mv₂² - ½mv₁²","Learn potential energy: gravitational (mgh) and spring (½kx²)","Learn conservation of energy: when to use it (no friction losses)","Practice: a roller coaster problem, a spring launching a block"],
   tip:"Work-energy is powerful because it skips the middle of the motion — you only care about start and end states. Use it when you don't need to know forces during the motion. If friction is involved, subtract the work done by friction.",
   free:["Jeff Hanson — Work Energy Dynamics YouTube","The Efficient Engineer — Work and Energy (great explainer)"],
   book:"Hibbeler — Engineering Mechanics: Dynamics (Ch. 14)"},

  {id:13,date:"Thu Apr 30",phase:"Dynamics",type:"learn",color:"#FF7AAD",
   topic:"Impulse, Momentum & Impact",qRange:"Part of 10–15 dynamics questions",
   subs:["Learn linear momentum: p = mv","Learn impulse-momentum: impulse = change in momentum (F·Δt = m·Δv)","Learn conservation of momentum: when no external force, total momentum is constant","Learn impact problems: elastic (KE conserved), perfectly plastic (stick together), coefficient of restitution e"],
   tip:"Impact problems: always write conservation of momentum. Then for elastic: KE is also conserved (gives 2 equations, 2 unknowns). For perfectly plastic: the two objects stick together. Coefficient of restitution e is in the handbook.",
   free:["Jeff Hanson — Impulse & Momentum YouTube","Michel van Biezen — Impact problems YouTube"],
   book:"Hibbeler — Engineering Mechanics: Dynamics (Ch. 15)"},

  {id:14,date:"Fri May 1",phase:"Dynamics",type:"learn",color:"#FF7AAD",
   topic:"Rigid Body Dynamics & Vibrations",qRange:"Part of 10–15 dynamics questions",
   subs:["Learn the difference between translating and rotating rigid bodies","For rotation: ΣM = I·α (like F = ma but for rotation)","Learn vibrations: natural frequency ωn = √(k/m), period T = 2π/ωn","Learn damping ratio: underdamped (ζ<1), overdamped (ζ>1), critical (ζ=1)"],
   tip:"For rigid bodies add a moment equation to your FBD. For vibrations: the natural frequency formula is the most tested thing — know it cold. If ζ < 1 (underdamped), the system oscillates. If ζ > 1, it slowly decays to rest.",
   free:["Jeff Hanson — Rigid Body Dynamics YouTube","Michel van Biezen — Vibrations playlist on YouTube (free)"],
   book:"Hibbeler — Dynamics (Ch. 17) + Rao — Mechanical Vibrations (Ch. 1–2 only)"},

  // ── PRACTICE 2 ──
  {id:15,date:"Thu May 7",phase:"Dynamics",type:"practice",color:"#FF7AAD",
   topic:"⚡ Practice — Dynamics",qRange:"20 problems — timed",
   subs:["5 kinematics problems (find velocity, acceleration, position)","5 Newton's law problems (find acceleration or force)","5 work-energy problems","5 momentum/vibration problems","Write down every formula you had to look up — those are your weak spots"],
   tip:"Statics + Dynamics together = the largest topic block on the FE. Nailing these gives you a huge score boost. Don't rush this practice session — really understand every wrong answer.",
   free:["PrepFE app — Dynamics questions","Lindeburg — FE Mechanical Practice Problems (Dynamics chapter)"],
   book:"NCEES FE Handbook — Dynamics section"},

  // ── MECHANICS OF MATERIALS ──
  {id:16,date:"Fri May 8",phase:"Mech of Materials",type:"learn",color:"#FF5599",
   topic:"Stress & Strain — The Basics",qRange:"Part of 9–14 questions",
   subs:["Learn normal stress: σ = P/A (force divided by area)","Learn normal strain: ε = δ/L (deformation divided by original length)","Learn Hooke's Law: σ = E·ε (stress = Young's modulus × strain)","Learn shear stress: τ = V/A, and shear strain γ","Practice: find stress and strain in a rod being pulled"],
   tip:"These are the most fundamental formulas in all of Mechanics of Materials. Every other topic builds on σ = P/A and σ = E·ε. Make sure you understand what each variable means physically — not just mathematically.",
   free:["structurefree — Mechanics of Materials YouTube (start here — the best free source)","Engineer4Free — Stress & Strain module"],
   book:"Hibbeler — Mechanics of Materials (Ch. 1–2)"},

  {id:17,date:"Thu May 14",phase:"Mech of Materials",type:"learn",color:"#FF5599",
   topic:"Bending Stress & Shear/Moment Diagrams",qRange:"Part of 9–14 questions",
   subs:["Learn what a shear force diagram and bending moment diagram are","Practice drawing SFD and BMD for a simply supported beam with a point load","Learn the flexure formula: σ = M·c / I (bending stress)","Learn where maximum bending stress occurs in a cross-section"],
   tip:"Draw shear and moment diagrams for EVERY beam problem — no shortcuts. σ = Mc/I is one of the top 3 most tested formulas on the entire FE exam. Practice it until it's automatic. The maximum stress is always at the outermost fiber (farthest from neutral axis).",
   free:["structurefree — Shear & Moment Diagrams YouTube (excellent step-by-step)","Engineer4Free — Bending Stress"],
   book:"Hibbeler — Mechanics of Materials (Ch. 6)"},

  {id:18,date:"Fri May 15",phase:"Mech of Materials",type:"learn",color:"#FF5599",
   topic:"Torsion & Mohr's Circle",qRange:"Part of 9–14 questions",
   subs:["Learn torsional shear stress: τ = T·c / J (torsion formula)","Learn polar moment of inertia J for solid and hollow shafts","Learn what Mohr's circle is: a graphical tool for stress transformation","Practice drawing Mohr's circle: plot (σx, -τxy) and (σy, τxy), draw circle, find principal stresses"],
   tip:"τ = Tc/J is the other top-tested formula alongside σ = Mc/I. Mohr's circle: once you practice drawing it 5–6 times it becomes automatic. The process is always the same — plot two points, draw the circle, read off the answers.",
   free:["structurefree — Torsion YouTube","structurefree — Mohr's Circle YouTube (step-by-step — watch this one twice)"],
   book:"Hibbeler — Mechanics of Materials (Ch. 5 + Ch. 9)"},

  {id:19,date:"Thu May 21",phase:"Mech of Materials",type:"learn",color:"#FF5599",
   topic:"Deflections, Buckling & Failure",qRange:"Part of 9–14 questions",
   subs:["Learn beam deflection: use the formula table in the handbook (don't derive)","Learn Euler column buckling: Pcr = π²EI/(KL)² — know K for 4 end conditions","Learn failure theories: von Mises (ductile) and max normal stress (brittle)","Learn the basic fatigue concept: S-N diagram, endurance limit"],
   tip:"Beam deflection formulas are in the handbook — look them up, don't memorize. Euler buckling: know K = 1 (pin-pin), K = 0.5 (fixed-fixed), K = 2 (fixed-free), K = 0.7 (fixed-pin). Failure theories: von Mises for ductile materials almost always.",
   free:["structurefree — Beam Deflections + Buckling YouTube","The Efficient Engineer — Column Buckling explainer"],
   book:"Hibbeler — Mechanics of Materials (Ch. 12 + 14)"},

  // ── PRACTICE 3 ──
  {id:20,date:"Fri May 22",phase:"Mech of Materials",type:"practice",color:"#FF5599",
   topic:"⚡ Practice — Mechanics of Materials",qRange:"20 problems — timed",
   subs:["5 stress/strain problems (axial and shear)","5 bending problems (draw SFD/BMD, find max bending stress)","5 torsion and Mohr's circle problems","5 deflection and buckling problems","Every wrong answer: find the formula in the handbook, redo from scratch"],
   tip:"MoM has 9–14 questions. If you can do stress calculations and bending problems reliably, you're picking up a lot of points. Don't rush the shear/moment diagrams — they take practice to do quickly.",
   free:["PrepFE — Mechanics of Materials drill","Lindeburg — FE Practice Problems (MoM chapter)"],
   book:"NCEES FE Handbook — mechanics of materials section"},

  // ── MATERIAL PROPERTIES ──
  {id:21,date:"Thu May 28",phase:"Materials",type:"learn",color:"#FF5588",
   topic:"Material Properties & Phase Diagrams",qRange:"7–11 exam questions",
   subs:["Learn the stress-strain diagram: elastic region, yield point, ultimate strength, fracture","Know the difference: ductile (bends before breaking) vs brittle (snaps suddenly)","Learn the Fe-C (iron-carbon) phase diagram: regions for ferrite, austenite, pearlite, martensite","Learn heat treatment effects: quenching makes steel hard & brittle, annealing makes it soft & ductile"],
   tip:"The stress-strain diagram is 100% guaranteed on the FE. Know what every region means. For the Fe-C diagram: the most tested points are the eutectoid composition (0.77% C) and the phases that form at different cooling rates. Quenching → martensite (hard). Annealing → softer, more ductile.",
   free:["Professor Dave Explains — Materials Science YouTube (free, well-explained)","The Efficient Engineer — Stress-Strain Curve explainer"],
   book:"Callister — Materials Science and Engineering: An Introduction (Ch. 6–10)"},

  // ── FLUIDS ──
  {id:22,date:"Fri May 29",phase:"Fluids",type:"learn",color:"#FF85B3",
   topic:"Fluid Properties & Pressure",qRange:"Part of 10–15 fluid questions",
   subs:["Learn key fluid properties: density (ρ), specific gravity, viscosity (dynamic μ, kinematic ν)","Learn pressure: what it is, absolute vs gauge pressure, units (Pa, psi, atm)","Learn how pressure varies with depth: p = ρgh","Learn manometers: how to read them and find pressure differences"],
   tip:"Pressure unit conversions trip people up — know them: 1 atm = 101.3 kPa = 14.7 psi. Gauge pressure = absolute − atmospheric. Pressure at depth: every 1 m of water adds ~9810 Pa (≈ ρgh). Manometers: trace the fluid path and add/subtract ρgh at each step.",

let checked={}, filter="All";
const total=S.length;

function updateProgress(){
  const n=Object.values(checked).filter(Boolean).length;
  const p=Math.round(n/total*100);
  const c=2*Math.PI*27;
  document.getElementById('ring').setAttribute('stroke-dashoffset',(c*(1-p/100)).toFixed(1));
  document.getElementById('ring').setAttribute('stroke',p===100?'#FF6B9D':'#FF5599');
  document.getElementById('pct').textContent=p+'%';
  document.getElementById('pcnt').textContent=n+' / '+total;
}

function toggleCheck(id,ev){
  if(ev){ev.stopPropagation();}
  checked[id]=!checked[id];
  const ses=document.getElementById('s'+id);
  const cb=document.getElementById('cb'+id);
  if(checked[id]){ses.classList.add('done');cb.classList.add('on');cb.textContent='✓';}
  else{ses.classList.remove('done');cb.classList.remove('on');cb.textContent='';}
  updateProgress();
}

function toggleExpand(id){
  const b=document.getElementById('b'+id);
  const a=document.getElementById('a'+id);
  const open=b.style.display==='block';
  document.querySelectorAll('.body').forEach(x=>x.style.display='none');
  document.querySelectorAll('.arr').forEach(x=>x.classList.remove('open'));
  if(!open){b.style.display='block';a.classList.add('open');}
}

function setFilter(ph){
  filter=ph;
  document.querySelectorAll('.fbtn').forEach(btn=>{
    const p=btn.dataset.phase,c=PC[p]||'#FF5599',active=p===ph;
    btn.style.borderColor=active?c:'#4a0028';
    btn.style.color=active?c:'#C4608A';
    btn.style.background=active?c+'22':'transparent';
  });
  renderSessions();
}

function renderSessions(){
  const list=document.getElementById('slist');
  const data=filter==='All'?S:S.filter(s=>s.phase===filter);
  list.innerHTML=data.map(s=>`
    <div class="card${checked[s.id]?' done':''}${s.type==='practice'?' pday':''}${s.type==='exam'?' xday':''}"
      id="s${s.id}" style="border-left:3px solid ${s.color}">
      <div class="ch" onclick="toggleExpand(${s.id})">
        <div class="cb${checked[s.id]?' on':''}" id="cb${s.id}" onclick="toggleCheck(${s.id},event)">${checked[s.id]?'✓':''}</div>
        <div class="num" style="color:${s.color}">#${String(s.id).padStart(2,'0')}</div>
        <div class="dt">${s.date}</div>
        <div class="ti">
          <div class="tn">${s.topic}</div>
          <div class="tq">${s.qRange}</div>
        </div>
        <div class="ph" style="color:${s.color}">${s.phase}</div>
        <div class="arr" id="a${s.id}">▾</div>
      </div>
      <div class="body" id="b${s.id}" style="display:none">
        <div class="sl">WHAT TO DO THIS SESSION</div>
        ${s.subs.map(t=>`<div class="sr"><span class="sa" style="color:${s.color}">→</span><span class="st">${t}</span></div>`).join('')}
        <div class="tip" style="background:#1C0010;border:1px solid ${s.color}33;border-radius:7px;margin-top:11px;padding:11px 13px">
          <div class="tiplbl">💡 TIP</div>
          <div class="tiptxt">${s.tip}</div>
        </div>
        <div class="rg" style="margin-top:10px">
          <div class="rb" style="border:1px solid #7a0040">
            <div class="rl" style="color:#FF7AAD">🆓 FREE RESOURCES</div>
            ${s.free.map(r=>`<div class="ri"><span style="color:#cc3366;flex-shrink:0">•</span>${r}</div>`).join('')}
          </div>
          <div class="rb" style="border:1px solid #7a0040">
            <div class="rl" style="color:#FF4D80">📖 TEXTBOOK</div>
            <div style="font-size:12px;color:#B05878;line-height:1.5">${s.book}</div>
          </div>
        </div>
      </div>
    </div>`).join('');
}

function renderFilters(){
  document.getElementById('filters').innerHTML=PHASES.map(p=>{
    const c=PC[p]||'#FF5599',active=p===filter;
    return `<button class="fbtn" data-phase="${p}" onclick="setFilter('${p}')"
      style="border-color:${active?c:'#4a0028'};color:${active?c:'#C4608A'};background:${active?c+'22':'transparent'}">${p}</button>`;
  }).join('');
}

function renderResources(){
  document.getElementById('rcontent').innerHTML=RESOURCES.map(sec=>`
    <div class="rs">
      <div class="rst" style="color:${sec.color}">${sec.label}</div>
      ${sec.items.map(i=>`
        <div class="rc" style="border-left-color:${sec.color}66">
          <div class="rcn">${i.name}</div>
          <div class="rcd">${i.detail}</div>
        </div>`).join('')}
    </div>`).join('');
}

function switchTab(t){
  document.getElementById('pt').style.display=t==='plan'?'block':'none';
  document.getElementById('rt').style.display=t==='resources'?'block':'none';
  document.querySelectorAll('.tab').forEach((b,i)=>{
    b.className='tab'+((i===0&&t==='plan')||(i===1&&t==='resources')?' active':'');
  });
}

renderFilters(); renderSessions(); renderResources();
</script>
</body>
</html>
